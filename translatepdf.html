<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI PDF Translator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f8fafc; 
            margin: 0;
        }
        .header {
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;
            border-top: 5px solid #a855f7; /* Purple accent */
            text-align: center;
        }
        h2 { color: #a855f7; margin-top: 0; }
        
        .controls {
            display: flex; gap: 15px; justify-content: center; align-items: center;
            flex-wrap: wrap; margin-top: 15px;
        }
        input[type="file"], input[type="password"], select { 
            padding: 10px; border: 1px solid #ccc; border-radius: 5px; 
        }
        button { 
            background-color: #a855f7; color: white; border: none; 
            padding: 10px 20px; border-radius: 6px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; 
        }
        button:hover { background-color: #9333ea; }
        button:disabled { background-color: #d8b4fe; cursor: not-allowed; }

        /* Side-by-Side Layout */
        .reader-container {
            display: flex; gap: 20px; height: 60vh;
        }
        .panel {
            flex: 1; background: white; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px;
            overflow-y: auto; border: 1px solid #e2e8f0;
            line-height: 1.6; font-size: 15px; color: #334155;
            white-space: pre-wrap; /* Keeps paragraph formatting */
        }
        .panel h3 { margin-top: 0; color: #64748b; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        
        .pagination {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            margin-top: 20px; font-weight: bold; color: #475569;
        }
        #status { text-align: center; margin-top: 10px; font-weight: bold; color: #a855f7; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Interactive Gemini Translator</h2>
        <div class="controls">
            <input type="password" id="apiKey" placeholder="Gemini API Key...">
            <input type="file" id="pdfInput" accept=".pdf">
            <select id="languageSelect">
                <option value="Spanish">Spanish</option>
                <option value="French">French</option>
                <option value="German">German</option>
                <option value="Hindi">Hindi</option>
                <option value="Japanese">Japanese</option>
                <option value="Arabic">Arabic</option>
            </select>
            <button id="loadBtn">Load Document</button>
        </div>
        <div id="status"></div>
    </div>

    <div class="reader-container">
        <div class="panel" id="originalPanel">
            <h3>Original Text</h3>
            <div id="originalText">Upload a PDF to see the text here...</div>
        </div>
        <div class="panel" id="translatedPanel">
            <h3>Translated text</h3>
            <div id="translatedText">Translations will appear here...</div>
        </div>
    </div>

    <div class="pagination" style="display: none;" id="paginationControls">
        <button id="prevBtn">← Previous Page</button>
        <span id="pageIndicator">Page 1 of ?</span>
        <button id="nextBtn">Next Page →</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        let currentPage = 1;

        const apiKeyInput = document.getElementById('apiKey');
        const pdfInput = document.getElementById('pdfInput');
        const languageSelect = document.getElementById('languageSelect');
        const loadBtn = document.getElementById('loadBtn');
        const statusText = document.getElementById('status');
        
        const originalTextDiv = document.getElementById('originalText');
        const translatedTextDiv = document.getElementById('translatedText');
        
        const paginationControls = document.getElementById('paginationControls');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        // --- 1. Load the PDF ---
        loadBtn.addEventListener('click', async () => {
            if (!apiKeyInput.value.trim()) return alert("Please enter your Gemini API Key.");
            if (!pdfInput.files[0]) return alert("Please select a PDF.");

            statusText.innerText = "Loading PDF...";
            loadBtn.disabled = true;

            try {
                const file = pdfInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                currentPage = 1;
                paginationControls.style.display = 'flex';
                await renderPage(currentPage);

            } catch (err) {
                console.error(err);
                statusText.innerText = "Error loading PDF.";
            } finally {
                loadBtn.disabled = false;
            }
        });

        // --- 2. Extract and Translate a Single Page ---
        async function renderPage(pageNum) {
            statusText.innerText = `Extracting text for Page ${pageNum}...`;
            originalTextDiv.innerText = "Reading...";
            translatedTextDiv.innerText = "Waiting for text...";
            
            prevBtn.disabled = (pageNum <= 1);
            nextBtn.disabled = (pageNum >= pdfDoc.numPages);
            pageIndicator.innerText = `Page ${pageNum} of ${pdfDoc.numPages}`;

            try {
                // Read original text
                const page = await pdfDoc.getPage(pageNum);
                const textContent = await page.getTextContent();
                const textStr = textContent.items.map(item => item.str).join(" ");
                
                originalTextDiv.innerText = textStr || "[Blank Page or Scanned Image]";

                if (!textStr.trim()) {
                    translatedTextDiv.innerText = "[Nothing to translate]";
                    statusText.innerText = "";
                    return;
                }

                // Translate with Gemini
                statusText.innerText = "Gemini is translating...";
                translatedTextDiv.innerText = "Translating... ⏳";

                const targetLang = languageSelect.value;
                const prompt = `Translate the following text into ${targetLang}. Only return the translation, no extra conversational text:\n\n${textStr}`;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKeyInput.value.trim()}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) throw new Error("API Request Failed");

                const data = await response.json();
                translatedTextDiv.innerText = data.candidates[0].content.parts[0].text;
                statusText.innerText = "Translation complete!";

            } catch (err) {
                console.error(err);
                translatedTextDiv.innerText = "Error translating this page.";
                statusText.innerText = "";
            }
        }

        // --- 3. Pagination Controls ---
        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentPage < pdfDoc.numPages) {
                currentPage++;
                renderPage(currentPage);
            }
        });
    </script>
</body>
</html>
