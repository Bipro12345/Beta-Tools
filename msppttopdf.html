<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT to PDF Converter</title>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 40px; 
            background-color: #fef2f2; /* Light red background */
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            display: inline-block;
            border-top: 5px solid #d83b01; /* PowerPoint Orange/Red */
            max-width: 450px;
            width: 100%;
            text-align: left;
        }
        h2 { color: #d83b01; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { font-size: 14px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        
        input[type="file"], input[type="text"] { 
            padding: 10px; width: 100%; box-sizing: border-box; 
            border: 1px solid #ccc; border-radius: 5px; 
        }
        
        button { 
            background-color: #d83b01; color: white; border: none; 
            padding: 12px 24px; border-radius: 6px; cursor: pointer; 
            font-size: 16px; font-weight: bold; width: 100%; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        button:hover { background-color: #a32a00; }
        button:disabled { background-color: #fca5a5; cursor: not-allowed; }
        
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: #555; }
        .warning { font-size: 12px; color: #dc2626; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h2>PPT to PDF</h2>
        
        <div class="input-group">
            <label for="apiKeyInput">1. ConvertAPI Secret Key:</label>
            <input type="text" id="apiKeyInput" placeholder="Enter your free API key...">
        </div>

        <div class="input-group">
            <label for="pptInput">2. Select a PowerPoint (.pptx):</label>
            <input type="file" id="pptInput" accept=".pptx, .ppt">
        </div>

        <button id="convertBtn">Convert via API & Download</button>
        <div id="status"></div>
        <p class="warning">Because PPTX files require a rendering engine, this tool uses a secure cloud API to perfectly preserve your slide layout.</p>
    </div>

    <script>
        document.getElementById('convertBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('pptInput');
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const status = document.getElementById('status');
            const btn = document.getElementById('convertBtn');

            if (!apiKey) return alert("Please enter your ConvertAPI Secret Key.");
            if (!fileInput.files[0]) return alert("Please select a .pptx file first!");

            btn.disabled = true;
            status.innerText = "Uploading presentation to server...";
            
            const file = fileInput.files[0];

            try {
                // 1. Convert the file into Base64 format so we can send it securely
                const reader = new FileReader();
                reader.onload = async function(event) {
                    // Extract just the raw base64 data, removing the "data:application/..." prefix
                    const base64Data = event.target.result.split(',')[1]; 

                    status.innerText = "Processing slides... (This takes a few seconds)";

                    // 2. Send the file to ConvertAPI
                    const response = await fetch(`https://v2.convertapi.com/convert/pptx/to/pdf?Secret=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            Parameters: [
                                {
                                    Name: 'File',
                                    FileValue: {
                                        Name: file.name,
                                        Data: base64Data
                                    }
                                }
                            ]
                        })
                    });

                    if (!response.ok) {
                        throw new Error("API request failed. Check your API key or file size.");
                    }

                    const data = await response.json();

                    // 3. Receive the converted PDF and trigger the download
                    const pdfBase64 = data.Files[0].FileData;
                    const pdfName = data.Files[0].FileName;

                    // Convert Base64 back to a downloadable Blob
                    const byteCharacters = atob(pdfBase64);
                    const byteNumbers = new Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) {
                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers);
                    const blob = new Blob([byteArray], { type: 'application/pdf' });
                    
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = pdfName;
                    link.click();
                    URL.revokeObjectURL(url);

                    status.innerText = "Success! PDF downloaded.";
                    btn.disabled = false;
                };

                // Read the file as a Data URL
                reader.readAsDataURL(file);

            } catch (err) {
                console.error(err);
                status.innerText = "Error: " + err.message;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
