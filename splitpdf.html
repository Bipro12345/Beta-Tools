<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split & Extract PDF</title>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 40px; 
            background-color: #eef2ff; /* Light indigo background */
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            display: inline-block;
            border-top: 5px solid #4f46e5; /* Indigo accent */
            max-width: 500px;
            width: 100%;
            text-align: left;
        }
        h2 { color: #4f46e5; text-align: center; margin-top: 0; }
        p { color: #64748b; font-size: 14px; text-align: center; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; }
        label { font-size: 14px; font-weight: bold; color: #475569; display: block; margin-bottom: 8px; }
        
        input[type="file"] { 
            padding: 10px; width: 100%; box-sizing: border-box; 
            border: 1px solid #cbd5e1; border-radius: 6px; 
        }

        /* Grid for the Start and End page inputs */
        .range-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .range-box input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }

        #pageInfo {
            text-align: center;
            font-size: 13px;
            color: #10b981; /* Green text to show successful load */
            font-weight: bold;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }

        button { 
            background-color: #4f46e5; color: white; border: none; 
            padding: 14px 24px; border-radius: 6px; cursor: pointer; 
            font-size: 16px; font-weight: bold; width: 100%; 
            transition: 0.3s; 
        }
        button:hover { background-color: #4338ca; }
        button:disabled { background-color: #a5b4fc; cursor: not-allowed; }
        
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Extract Pages (Split PDF)</h2>
        <p>Slice out a specific section of your document into a new PDF.</p>
        
        <div class="input-group">
            <label for="pdfInput">1. Select your PDF:</label>
            <input type="file" id="pdfInput" accept=".pdf">
        </div>

        <div id="pageInfo"></div>

        <label>2. Choose Page Range to Extract:</label>
        <div class="range-grid">
            <div class="range-box">
                <label for="startPage" style="font-size: 12px; color: #64748b;">From Page:</label>
                <input type="number" id="startPage" min="1" placeholder="e.g., 2">
            </div>
            <div class="range-box">
                <label for="endPage" style="font-size: 12px; color: #64748b;">To Page:</label>
                <input type="number" id="endPage" min="1" placeholder="e.g., 5">
            </div>
        </div>

        <button id="splitBtn" disabled>Split & Download</button>
        <div id="status"></div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;

        let originalPdfBytes = null;
        let totalPages = 0;

        const fileInput = document.getElementById('pdfInput');
        const startPageInput = document.getElementById('startPage');
        const endPageInput = document.getElementById('endPage');
        const splitBtn = document.getElementById('splitBtn');
        const statusText = document.getElementById('status');
        const pageInfo = document.getElementById('pageInfo');

        // --- 1. Load the PDF to get the total page count ---
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusText.innerText = "Loading document...";
            splitBtn.disabled = true;

            try {
                originalPdfBytes = await file.arrayBuffer();
                const pdfDoc = await PDFDocument.load(originalPdfBytes);
                totalPages = pdfDoc.getPageCount();

                // Update UI to show the user how many pages they can choose from
                pageInfo.innerText = `Document loaded! Total Pages: ${totalPages}`;
                pageInfo.style.display = 'block';
                
                // Set max values for the inputs
                startPageInput.max = totalPages;
                endPageInput.max = totalPages;
                
                splitBtn.disabled = false;
                statusText.innerText = "";
            } catch (err) {
                console.error(err);
                statusText.innerText = "Error: Could not read the PDF.";
            }
        });

        // --- 2. Slice the PDF and Download ---
        splitBtn.addEventListener('click', async () => {
            if (!originalPdfBytes) return;

            // Grab the numbers the user typed in
            const startPage = parseInt(startPageInput.value);
            const endPage = parseInt(endPageInput.value);

            // Validation Checks
            if (isNaN(startPage) || isNaN(endPage)) {
                return alert("Please enter both a start and end page number.");
            }
            if (startPage < 1 || endPage > totalPages) {
                return alert(`Invalid range. Please enter numbers between 1 and ${totalPages}.`);
            }
            if (startPage > endPage) {
                return alert("The Start Page cannot be greater than the End Page!");
            }

            statusText.innerText = "Extracting pages... please wait.";
            splitBtn.disabled = true;

            try {
                // Load the original document
                const donorPdf = await PDFDocument.load(originalPdfBytes);
                // Create a brand new, empty document
                const newPdf = await PDFDocument.create();

                // Figure out which page indexes to copy (PDF-lib uses 0-based counting)
                // If user wants pages 2 through 4, we need indexes [1, 2, 3]
                const pagesToCopy = [];
                for (let i = startPage - 1; i <= endPage - 1; i++) {
                    pagesToCopy.push(i);
                }

                // Copy the pages and add them to the new document
                const copiedPages = await newPdf.copyPages(donorPdf, pagesToCopy);
                copiedPages.forEach((page) => newPdf.addPage(page));

                // Save and Download
                const pdfBytes = await newPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `Extracted_Pages_${startPage}_to_${endPage}.pdf`;
                link.click();
                URL.revokeObjectURL(url);

                statusText.innerText = "Success! Extracted PDF downloaded.";
            } catch (err) {
                console.error(err);
                statusText.innerText = "Error: Could not split the document.";
            } finally {
                splitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
