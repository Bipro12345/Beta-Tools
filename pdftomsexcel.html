<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Excel Converter</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; background-color: #f0fdf4; }
        .card { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); display: inline-block;
            border-top: 5px solid #16a34a; /* Excel Green */
        }
        h2 { color: #16a34a; }
        input[type="file"] { margin: 20px 0; }
        button { 
            background-color: #16a34a; color: white; border: none; 
            padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px;
        }
        button:hover { background-color: #15803d; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <h2>PDF to Excel</h2>
        <p>Extract tables and data into a spreadsheet</p>
        <input type="file" id="pdfInput" accept=".pdf">
        <br>
        <button id="convertBtn">Convert to XLSX</button>
        <div id="status"></div>
    </div>

    <script>
        // Set up PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('pdfInput');
            const status = document.getElementById('status');
            
            if (!fileInput.files[0]) return alert("Please select a PDF!");

            status.innerText = "Reading PDF data...";
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();

            try {
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let excelData = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    // Group text items by their vertical (Y) position to form rows
                    const lines = {};
                    textContent.items.forEach(item => {
                        const y = Math.round(item.transform[5]); // The Y coordinate
                        if (!lines[y]) lines[y] = [];
                        lines[y].push(item);
                    });

                    // Sort rows from top to bottom
                    const sortedY = Object.keys(lines).sort((a, b) => b - a);
                    
                    sortedY.forEach(y => {
                        // Sort items in the row from left to right
                        const rowItems = lines[y].sort((a, b) => a.transform[4] - b.transform[4]);
                        const rowData = rowItems.map(item => item.str.trim()).filter(s => s !== "");
                        
                        if (rowData.length > 0) {
                            excelData.push(rowData);
                        }
                    });
                }

                // Create the Excel Workbook
                const worksheet = XLSX.utils.aoa_to_sheet(excelData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");

                // Download the file
                XLSX.writeFile(workbook, "Converted_Data.xlsx");
                
                status.innerText = "Done! Excel file downloaded.";
            } catch (err) {
                console.error(err);
                status.innerText = "Error extracting data.";
            }
        });
    </script>
</body>
</html>
