<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 40px; 
            background-color: #fdfbf7; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            display: inline-block;
            border-top: 5px solid #f59e0b; /* Amber accent */
            max-width: 450px;
            width: 100%;
            text-align: left;
        }
        h2 { color: #f59e0b; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { font-size: 14px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        input[type="file"], select { 
            padding: 10px; width: 100%; box-sizing: border-box; 
            border: 1px solid #ccc; border-radius: 5px; 
        }
        button { 
            background-color: #f59e0b; color: white; border: none; 
            padding: 12px 24px; border-radius: 6px; cursor: pointer; 
            font-size: 16px; font-weight: bold; width: 100%; 
            transition: 0.3s; 
        }
        button:hover { background-color: #d97706; }
        button:disabled { background-color: #fcd34d; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: #555; }
        .warning { font-size: 12px; color: #dc2626; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Compress PDF</h2>
        
        <div class="input-group">
            <label for="pdfInput">1. Select PDF to shrink:</label>
            <input type="file" id="pdfInput" accept=".pdf">
        </div>

        <div class="input-group">
            <label for="qualitySelect">2. Compression Level:</label>
            <select id="qualitySelect">
                <option value="0.8">Light (Good Quality, Medium Size)</option>
                <option value="0.5" selected>Medium (Average Quality, Small Size)</option>
                <option value="0.2">Extreme (Low Quality, Tiny Size)</option>
            </select>
        </div>

        <button id="compressBtn">Compress & Download</button>
        <div id="status"></div>
        <p class="warning">Note: This process converts text to images. The resulting PDF will not be text-searchable.</p>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        document.getElementById('compressBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('pdfInput');
            const qualitySelect = parseFloat(document.getElementById('qualitySelect').value);
            const status = document.getElementById('status');
            const btn = document.getElementById('compressBtn');

            if (!fileInput.files[0]) return alert("Please select a PDF file.");

            btn.disabled = true;
            status.innerText = "Processing... this might take a minute.";
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();

            try {
                // Load original PDF
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const { jsPDF } = window.jspdf;
                
                // Create a new blank PDF
                const newPdf = new jsPDF({ orientation: "portrait", unit: "px", format: "a4" });

                for (let i = 1; i <= pdf.numPages; i++) {
                    status.innerText = `Compressing page ${i} of ${pdf.numPages}...`;
                    
                    const page = await pdf.getPage(i);
                    // Scale down the rendering slightly to save more space
                    const viewport = page.getViewport({ scale: 1.5 }); 
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    // Draw the page to the canvas
                    await page.render({ canvasContext: context, viewport: viewport }).promise;

                    // Compress the canvas image to a lower quality JPEG
                    const imgData = canvas.toDataURL('image/jpeg', qualitySelect);

                    // Add the compressed image to the new PDF
                    const pdfWidth = newPdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    if (i > 1) newPdf.addPage();
                    newPdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                }

                status.innerText = "Saving compressed file...";
                newPdf.save("Compressed_Document.pdf");
                status.innerText = "Success! File downloaded.";

            } catch (err) {
                console.error(err);
                status.innerText = "Error compressing PDF.";
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
